<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 성격 유형 테스트 - Dynamic Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>
    <main class="container">
        <!-- Start Screen -->
        <section class="screen" id="start-screen">
            <div class="glass-card">
                <div class="badge">PRO Dynamic MBTI</div>
                <h1 id="title">나의 진짜 성격은?</h1>
                <p id="description">16개의 질문 중 랜덤하게 추출된 8개의 질문으로 새롭게 만나는 MBTI</p>
                <button id="start-btn" class="glow-on-hover">테스트 시작하기</button>
            </div>
        </section>

        <!-- Question Screen -->
        <section class="screen hidden" id="question-screen">
            <div class="glass-card">
                <div class="q-header">
                    <span id="q-number" class="badge">Q1.</span>
                    <div class="progress-bar-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                </div>
                <h2 id="q-text">질문 로딩 중...</h2>
                <div class="choice-container">
                    <button class="choice-btn" id="btn-a" data-choice="a">선택지 로딩 중...</button>
                    <button class="choice-btn" id="btn-b" data-choice="b">선택지 로딩 중...</button>
                </div>
            </div>
        </section>

        <!-- Result Screen -->
        <section class="screen hidden" id="result-screen">
            <div class="glass-card result-card">
                <div class="badge">검사 완료</div>
                <div class="character-container">
                    <img id="result-img" src="" alt="MBTI Character" class="character-img">
                </div>
                <h1 id="result-type" class="mega-text">ENFP</h1>
                <h3 id="result-alias" class="result-nickname">"재기발랄한 활동가"</h3>
                <div class="result-content">
                    <p id="result-desc" class="result-desc">설명이 들어갈 자리입니다.</p>
                    <div class="humor-box">
                        <span class="humor-label">🎬 상황 포착</span>
                        <p id="result-humor">유머러스한 응답 예시가 들어갈 자리입니다.</p>
                    </div>
                </div>
                <button id="retry-btn" class="glow-on-hover">테스트 다시하기</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
